<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Casey Sharp Art | Nature Inspired Artwork</title>
    <meta name="description" content="Explore Casey Sharp Art through a hand-painted garden portal featuring nature-inspired artwork, ACEOs, and original creations.">

    <meta property="og:title" content="Casey Sharp Art">
    <meta property="og:description" content="Step into a painted world of nature-inspired artwork.">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="loading-screen">
    <p>Entering the garden...</p>
</div>


<header class="hidden-nav">
    <nav>
        <a href="index.html">Home</a>
        <a href="nature.html">Nature</a>
        <a href="archive.html">Archive</a>
    </nav>
</header>


<main class="scene-page">

<section class="scene-container homepage-scene">

    <!-- Main painted yard -->
    <img 
        class="scene-background"
        src="assets/homepage_nature.png"
        alt="Painted front yard garden portal"
    >


    <!-- Seasonal layers -->
    <!-- Enable/disable these layers as seasons change -->

    <img 
        class="season-layer trees"
        src="assets/homepage_nature_summer_tree_fireflies.gif"
        alt="Summer trees with glowing fireflies"
    >

    <img 
        class="season-layer right-meadow"
        src="assets/homepage_nature_summer_right_meadow_flowers.png"
        alt="Summer right meadow flowers"
    >

    <img 
        class="season-layer left-meadow"
        src="assets/homepage_nature_summer_left_meadow_flowers.png"
        alt="Summer left meadow flowers"
    >

    <img 
        class="season-layer butterfly-layer"
        src="assets/homepage_nature_summer_left_meadow_butterflybee.gif"
        alt="Butterfly and bee in summer meadow"
    >



    <!-- Welcome sign interaction -->

    <div class="interactive welcome-sign">

        <div class="popup welcome-popup">

            <p>
                Thank you for visiting my portfolio.
            </p>

            <div class="social-links">

                <a 
                href="https://www.instagram.com/caseysharp.art"
                target="_blank"
                aria-label="Instagram">

                    <img 
                    src="assets/insta.png"
                    alt="Instagram">

                </a>


                <a 
                href="https://preview.mailerlite.io/forms/2463271/191663609776965451/share"
                target="_blank"
                aria-label="Newsletter signup">

                    <img 
                    src="assets/email-icon.jpg"
                    alt="Newsletter signup">

                </a>

            </div>

        </div>

    </div>



    <!-- Nature door portal -->

    <a 
    href="nature.html"
    class="interactive nature-door"
    aria-label="Enter the nature gallery">

    </a>



    <!-- Garden sign -->

    <div class="interactive garden-sign">

        <div class="popup">

            <p>
                Take a walk through my garden to explore nature-inspired works.
            </p>

        </div>

    </div>



    <!-- Shed archive portal -->

    <a 
    href="archive.html"
    class="interactive shed-door"
    aria-label="View archived artwork">

        <div class="popup">

            <p>
                Check out archived or sold pieces.
            </p>

        </div>

    </a>



</section>


</main>


<script src="script.js"></script>

</body>
</html>
