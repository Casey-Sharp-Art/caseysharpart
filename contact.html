<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER (static version of your Header.tsx idea) -->
  <header class="header">
    <div class="header-inner">

      <a href="index.html" class="logo">
        Casey Sharp
      </a>

      <nav class="nav">
        <a href="index.html">Portfolio</a>
        <a href="contact.html">Contact</a>
      </nav>

      <div class="socials">
        <a href="https://www.instagram.com/caseysharp.art" target="_blank">
          <img src="10900021.png" alt="Instagram Logo">
          </a>
        <a href="https://x.com/CaseyandLines" target="_blank">
          <img src="v997-05.png" alt="Twitter Logo">
          </a>
      </div>

    </div>
  </header>

  <main class="container">

    <!-- TITLE SECTION -->
    <section class="hero">
      <h1>Get in Touch</h1>

      <p class="subtext">
        For commissions, print inquiries, collaborations, or just to say hello.
      </p>
    </section>

    <!-- TWO COLUMN LAYOUT -->
    <div class="two-col">

      <!-- CONTACT FORM -->
      <section>
        <h2>Send a message</h2>

        <form
          name="contact"
          method="POST"
          action="mailto:caseysharp@caseysharpart.com"
          enctype="text/plain"
        >

          <label>
            Name
            <input type="text" name="name" placeholder="Your name" required />
          </label>

          <label>
            Email
            <input type="email" name="email" placeholder="you@example.com" required />
          </label>

          <label>
            Message
            <textarea name="message" rows="6" placeholder="Tell me about your project..." required></textarea>
          </label>

          <button type="submit">
            Send Message
          </button>

        </form>
      </section>

      <!-- SOCIAL LINKS -->
      <section class="contact-socials">
        <h2>Find me online</h2>

        <div class="social-card-container">

          <a class="social-card" href="https://www.instagram.com/caseysharp.art" target="_blank">
            <img src="10900021.png" alt="Instagram">
            <div>
              <strong>Instagram</strong>
              <p>@caseysharp.art</p>
              </div>
          </a>

          <a class="social-card" href="https://x.com/CaseyandLines" target="_blank">
            <img src="v997-05.png" alt="X / Twitter">
            <div>
              <strong>X / Twitter</strong>
              <p>@CaseyandLines</p>
            </div>
          </a>

        </div>
      </section>

    </div>

  </main>

    <footer class="footer">
    <div class="footer-inner">
      
      <a href="index.html" class="logo">
        Copyright 2026 Casey Sharp
      </a>

      <nav class="nav">
        <a href="index.html">Portfolio</a>
        <a href="contact.html">Contact</a>
      </nav>

      <div class="socials">
        <a href="https://www.instagram.com/caseysharp.art" target="_blank">
          <img src="10900021.png" alt="Instagram Logo">
          </a>
        <a href="https://x.com/CaseyandLines" target="_blank">
          <img src="v997-05.png" alt="Twitter Logo">
          </a>
      </div>

    </div>
  </footer>

</body>
</html>
